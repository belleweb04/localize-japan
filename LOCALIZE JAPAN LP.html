<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>LOCALIZE JAPAN — LP refresh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=Noto+Serif+JP:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6F2;
    --ink:#0F1113;
    --ink-2:#3A3A3A;
    --mute:#7A7A7A;
    --line:#E3E1DA;
    --paper:#FFFFFF;
    --accent:#20C3FF;
    --accent-2:#FFF2CE;
    --accent-deep:#1A3A5C;
    --gold:#B28844;
    --rad:14px;
    --maxw:420px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#E7E5DF;color:var(--ink);font-family:"Noto Sans JP",system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding:32px 0 120px;min-height:100vh}

  /* ── Stage: show all 3 mobile frames side-by-side on desktop, single on mobile ── */
  .stage{display:flex;gap:32px;justify-content:center;align-items:flex-start;flex-wrap:wrap;padding:0 24px}
  .frame-wrap{display:flex;flex-direction:column;gap:14px;align-items:center}
  .frame-label{font-family:Inter,sans-serif;font-size:12px;letter-spacing:.22em;color:#5a5a5a;text-transform:uppercase}
  .frame-label b{display:block;font-size:18px;letter-spacing:.04em;color:#111;text-transform:none;font-family:"Noto Sans JP";font-weight:700;margin-top:4px}
  .frame{width:375px;background:var(--bg);border-radius:36px;overflow:hidden;box-shadow:0 30px 80px -30px rgba(0,0,0,.35),0 2px 0 rgba(255,255,255,.6) inset;position:relative}
  @media (max-width:1260px){
    body{padding:16px 0 80px}
    .stage{gap:18px;padding:0 8px}
  }

  /* ───────── SHARED SECTIONS ───────── */
  section{position:relative}
  .eyebrow{font-family:Inter,sans-serif;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--mute);font-weight:500}
  .h2{font-family:"Noto Sans JP";font-weight:700;font-size:24px;line-height:1.4;letter-spacing:.02em;color:var(--ink)}
  .h3{font-family:"Noto Sans JP";font-weight:700;font-size:17px;line-height:1.5;letter-spacing:.04em}
  .body{font-family:"Noto Sans JP";font-weight:400;font-size:14px;line-height:1.85;color:var(--ink-2);letter-spacing:.03em}
  .small{font-size:12px;color:var(--mute);letter-spacing:.04em;font-weight:400}

  /* image placeholders */
  .ph{background:
    repeating-linear-gradient(135deg,rgba(0,0,0,.04) 0 6px,rgba(0,0,0,0) 6px 12px),
    linear-gradient(#ECEAE4,#DAD7D0);
    color:#7a7a7a;font-family:"JetBrains Mono",ui-monospace,monospace;font-size:10px;letter-spacing:.08em;
    display:flex;align-items:center;justify-content:center;text-align:center;border:1px solid rgba(0,0,0,.06)}

  /* top nav strip, shared */
  .topnav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:transparent;position:absolute;top:0;left:0;right:0;z-index:5}
  .logo{display:flex;align-items:center;gap:8px}
  .logo-mark{width:28px;height:28px;background:#1A1A1A;color:#fff;display:grid;place-items:center;font-family:Inter,sans-serif;font-weight:800;font-size:14px;border-radius:6px}
  .logo-text{font-family:Inter,sans-serif;font-weight:700;font-size:11px;letter-spacing:.18em;color:#1A1A1A;line-height:1.1}
  .logo-text span{display:block;font-weight:400;font-size:9px;letter-spacing:.3em;color:var(--mute)}
  .menu-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,0,0,.15);background:rgba(255,255,255,.7);backdrop-filter:blur(12px);display:grid;place-items:center}
  .menu-btn i{display:block;width:14px;height:1px;background:#111;position:relative}
  .menu-btn i:before,.menu-btn i:after{content:"";position:absolute;left:0;width:14px;height:1px;background:#111}
  .menu-btn i:before{top:-4px}.menu-btn i:after{top:4px}

  /* safety: default icon size for any inline arrow svg */
  .frame svg{max-width:24px;max-height:24px}
  .frame .hero-copy svg,.frame .final svg,.frame .final2 svg,.frame .final-c svg,.frame .cta svg,.frame .gform svg,.frame .btn svg{width:18px;height:10px;flex:none}

  /* fade-in on scroll into frame */
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .8s ease, transform .8s ease}
  .reveal.on{opacity:1;transform:none}

  /* ═════════════════════════════════════════════════ */
  /*  VARIANT A — REFINED POP                          */
  /* ═════════════════════════════════════════════════ */
  .vA{--bg:#FAFAF6;--ink:#151515;--accent:#22C1E3;--accent-2:#FFE9A8}
  .vA .hero{height:640px;position:relative;overflow:hidden;
    background:
      radial-gradient(120% 80% at 20% 0%, #CFF4FB 0%, transparent 55%),
      radial-gradient(120% 80% at 100% 20%, #FFF4CC 0%, transparent 55%),
      linear-gradient(#F6F4EC,#FAFAF6);}
  .vA .hero-art{position:absolute;left:-20px;top:50px;right:-20px;height:420px;
    background:url(assets/img_japanize.png) center/contain no-repeat;opacity:.92;
    filter:contrast(1.02) saturate(.95)}
  .vA .hero-copy{position:absolute;left:24px;right:24px;top:90px;z-index:2}
  .vA .hero-copy .kicker{font-family:"Noto Sans JP",sans-serif;font-size:13px;letter-spacing:.3em;color:#2B5A6B}
  .vA .hero-copy h1{margin:12px 0 0;font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:38px;line-height:1.25;letter-spacing:.02em}
  .vA .hero-copy h1 .mark{background:linear-gradient(transparent 60%, #FFE27A 60%);padding:0 4px}
  .vA .hero-copy .sub{margin-top:14px;font-family:"Noto Sans JP";font-size:13px;color:#374047;letter-spacing:.08em}
  .vA .hero-bottom{position:absolute;left:24px;right:24px;bottom:28px;z-index:3}
  .vA .hero-bottom .tag{display:inline-block;padding:8px 16px;border-radius:999px;background:#fff;border:1px solid #DDD;font-size:12px;letter-spacing:.06em;color:#333;box-shadow:0 4px 0 rgba(0,0,0,.06)}
  .vA .cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:54px;margin-top:12px;border-radius:30px;background:linear-gradient(#2DD4F7,#0FA7CD);color:#fff;font-weight:700;font-size:16px;letter-spacing:.1em;border:2px solid #fff;box-shadow:0 6px 0 rgba(10,80,100,.18)}
  .vA .cta svg{width:14px;height:14px}

  .vA .sec{padding:56px 24px}
  .vA .sec-label{display:inline-flex;align-items:center;gap:10px;font-family:Inter,sans-serif;font-size:11px;letter-spacing:.3em;color:#8A8A8A;text-transform:uppercase}
  .vA .sec-label:before{content:"";width:28px;height:1px;background:#111}
  .vA .sec h2{margin:8px 0 28px;font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:26px;line-height:1.45;letter-spacing:.04em;color:#111}

  .vA .probs{display:grid;gap:12px}
  .vA .prob{display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;padding:16px 18px;border:1px solid #ECEAE3;box-shadow:0 2px 0 rgba(0,0,0,.03)}
  .vA .prob .n{width:28px;height:28px;flex:none;border-radius:50%;background:#FFF2CE;color:#8A6A1F;display:grid;place-items:center;font-family:Inter,sans-serif;font-weight:700;font-size:12px}
  .vA .prob p{margin:0;font-size:14px;font-weight:500;line-height:1.55}

  .vA .solve{margin-top:28px;background:linear-gradient(180deg,#22C1E3,#BFF0F9);padding:28px 22px;border-radius:20px;color:#fff;text-align:center;position:relative;overflow:hidden}
  .vA .solve:after{content:"";position:absolute;inset:-40px;background:radial-gradient(circle at 80% 20%, rgba(255,255,255,.4), transparent 50%)}
  .vA .solve .tag{display:inline-block;padding:6px 14px;border-radius:999px;background:rgba(255,255,255,.25);font-size:11px;letter-spacing:.2em}
  .vA .solve h3{margin:12px 0 0;font-family:"Noto Sans JP",sans-serif;font-size:24px;letter-spacing:.04em;line-height:1.4;position:relative}
  .vA .solve h3 em{font-style:normal;background:#fff;color:#0E7A98;padding:2px 10px;border-radius:6px}

  .vA .grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:22px}
  .vA .grid4 .cell{background:#fff;border:1px solid #ECEAE3;border-radius:14px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .vA .grid4 .cell .ico{width:44px;height:44px;border-radius:50%;background:#F7F4E6;display:grid;place-items:center;color:#B28844;font-family:"Noto Sans JP",sans-serif;font-size:18px;font-weight:700}
  .vA .grid4 .cell h4{margin:0;font-size:13px;font-weight:700;letter-spacing:.04em;line-height:1.5}
  .vA .grid4 .cell.wide{grid-column:1/-1;background:#F7F4E6;border:1px dashed #D6C9A1;color:#7A6426}

  /* 3 points horizontal cards */
  .vA .points{display:grid;gap:14px;margin-top:22px}
  .vA .pt{background:#fff;border-radius:18px;border:1px solid #ECEAE3;padding:22px 20px;position:relative;overflow:hidden}
  .vA .pt .idx{position:absolute;right:18px;top:16px;font-family:"Noto Sans JP",sans-serif;font-size:44px;color:#F0ECDE;font-weight:700;letter-spacing:-.02em}
  .vA .pt h4{margin:0 0 6px;font-family:"Noto Sans JP",sans-serif;font-size:20px;letter-spacing:.04em;line-height:1.4}
  .vA .pt .tag{display:inline-block;font-size:10px;letter-spacing:.2em;padding:3px 10px;border-radius:999px;background:#F7F4E6;color:#8A6A1F;margin-bottom:10px}
  .vA .pt p{margin:0;font-size:13px;color:#444;line-height:1.85}
  .vA .pt.cyan{background:linear-gradient(180deg,#E8F9FD,#fff)}
  .vA .pt.gold{background:linear-gradient(180deg,#FBF6E4,#fff)}
  .vA .pt.rose{background:linear-gradient(180deg,#FDEEE6,#fff)}

  /* Before/After */
  .vA .ba{margin-top:22px;display:grid;gap:18px}
  .vA .ba .case{background:#fff;border-radius:18px;overflow:hidden;border:1px solid #ECEAE3}
  .vA .ba .case .hd{background:#151515;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
  .vA .ba .case .hd .label{font-family:Inter,sans-serif;letter-spacing:.22em;font-size:11px}
  .vA .ba .case .hd .use{font-size:10px;color:#ccc;letter-spacing:.1em}
  .vA .ba .pair{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#ECEAE3}
  .vA .ba .pair .col{background:#fff;padding:12px 10px;text-align:center}
  .vA .ba .pair .col .tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;letter-spacing:.2em;margin-bottom:8px;font-family:Inter,sans-serif;font-weight:600}
  .vA .ba .pair .before .tag{background:#F2F2F2;color:#888}
  .vA .ba .pair .after .tag{background:#151515;color:#fff}
  .vA .ba .pair .ph{height:150px;border-radius:6px}
  .vA .ba .pair .col small{display:block;margin-top:6px;font-size:10px;color:#999}

  /* flow steps */
  .vA .flow{margin-top:22px;display:grid;gap:10px}
  .vA .step{display:flex;gap:16px;align-items:flex-start;background:#fff;border:1px solid #ECEAE3;border-radius:14px;padding:18px 18px;position:relative}
  .vA .step .num{font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:30px;color:#22C1E3;min-width:46px;line-height:1;letter-spacing:-.02em}
  .vA .step h5{margin:0 0 4px;font-size:15px;font-weight:700;letter-spacing:.04em}
  .vA .step p{margin:0;font-size:12px;color:#666;line-height:1.7}

  /* about */
  .vA .about{margin-top:28px;background:linear-gradient(180deg,#F0F0EB,#fff);border-radius:20px;padding:28px 24px;position:relative;overflow:hidden}
  .vA .about h3{margin:0 0 8px;font-family:"Noto Sans JP",sans-serif;font-size:22px;letter-spacing:.04em}
  .vA .about .services{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
  .vA .about .srv{padding:10px 12px;background:#fff;border:1px solid #ECEAE3;border-radius:10px;display:flex;align-items:center;gap:8px;font-size:12px}
  .vA .about .srv .dot{width:8px;height:8px;border-radius:50%;background:#22C1E3}

  /* final cta */
  .vA .final{margin-top:32px;padding:40px 24px 48px;background:
      linear-gradient(rgba(34,193,227,.9),rgba(16,130,160,.9)),
      url(assets/cta_bg.jpg) center/cover;
      color:#fff;border-radius:0;text-align:center;position:relative}
  .vA .final h3{margin:0 0 10px;font-family:"Noto Sans JP",sans-serif;font-size:26px;letter-spacing:.08em}
  .vA .final p{margin:0 0 20px;font-size:13px;opacity:.9}
  .vA .final .gform{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:50px;background:#fff;color:#0F7A98;font-weight:700;letter-spacing:.1em;border-radius:28px;font-size:14px}

  /* ═════════════════════════════════════════════════ */
  /*  VARIANT B — EDITORIAL MINIMAL                    */
  /* ═════════════════════════════════════════════════ */
  .vB{--bg:#FAF9F5;--ink:#141414}
  .vB .hero{padding:76px 28px 40px;background:#FAF9F5;border-bottom:1px solid #E6E3D9;position:relative;overflow:hidden}
  .vB .hero .label{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.4em;color:#888;text-transform:uppercase}
  .vB .hero h1{margin:18px 0 0;font-family:"Noto Sans JP",sans-serif;font-weight:600;font-size:40px;line-height:1.28;letter-spacing:.04em;color:#141414}
  .vB .hero h1 i{font-style:normal;border-bottom:2px solid #141414;padding-bottom:2px}
  .vB .hero .lead{margin-top:18px;font-size:13px;line-height:2;color:#444;letter-spacing:.08em;max-width:280px}
  .vB .hero-media{margin:28px -28px 0;height:280px;position:relative;overflow:hidden;background:#F0EDE3}
  .vB .hero-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;mix-blend-mode:multiply;opacity:.95}
  .vB .hero-media .caption{position:absolute;left:20px;bottom:16px;font-family:Inter,sans-serif;font-size:10px;letter-spacing:.3em;color:#555;background:rgba(255,255,255,.8);padding:6px 10px;backdrop-filter:blur(6px)}
  .vB .hero-meta{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:20px 28px 8px;border-top:1px solid #E6E3D9;margin-top:0;background:#FAF9F5}
  .vB .hero-meta .m .t{font-family:Inter,sans-serif;font-size:9px;letter-spacing:.3em;color:#888;text-transform:uppercase}
  .vB .hero-meta .m .v{margin-top:4px;font-family:"Noto Sans JP",sans-serif;font-size:14px;color:#111;letter-spacing:.04em}

  .vB .sec{padding:72px 28px;border-bottom:1px solid #E6E3D9}
  .vB .idx-line{display:flex;align-items:baseline;gap:14px;margin-bottom:28px}
  .vB .idx-line .num{font-family:Inter,sans-serif;font-size:11px;letter-spacing:.25em;color:#B28844}
  .vB .idx-line .rule{flex:1;height:1px;background:#DAD6C8}
  .vB .idx-line .eye{font-family:Inter,sans-serif;font-size:11px;letter-spacing:.3em;color:#888;text-transform:uppercase}
  .vB h2{margin:0 0 32px;font-family:"Noto Sans JP",sans-serif;font-weight:600;font-size:28px;line-height:1.45;letter-spacing:.04em;color:#141414}

  .vB .prob-list{display:grid;gap:0}
  .vB .prob-row{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:20px 0;border-top:1px solid #E6E3D9}
  .vB .prob-row:last-child{border-bottom:1px solid #E6E3D9}
  .vB .prob-row .n{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.25em;color:#B28844}
  .vB .prob-row .q{font-family:"Noto Sans JP";font-size:15px;font-weight:500;line-height:1.6;letter-spacing:.04em}
  .vB .prob-row .c{font-size:11px;color:#B28844;letter-spacing:.08em}

  .vB .solve-note{margin-top:40px;padding:28px;border:1px solid #141414;position:relative}
  .vB .solve-note .tag{position:absolute;top:-10px;left:20px;background:#FAF9F5;padding:0 10px;font-family:Inter,sans-serif;font-size:10px;letter-spacing:.3em;color:#141414}
  .vB .solve-note p{margin:0;font-family:"Noto Sans JP",sans-serif;font-size:18px;line-height:1.8;letter-spacing:.04em;color:#141414}

  .vB .cap-grid{display:grid;gap:28px;margin-top:16px}
  .vB .cap{display:grid;grid-template-columns:40px 1fr;gap:18px;padding:18px 0;border-top:1px solid #E6E3D9}
  .vB .cap .no{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.25em;color:#B28844;padding-top:4px}
  .vB .cap h4{margin:0 0 6px;font-family:"Noto Sans JP",sans-serif;font-size:20px;letter-spacing:.04em;line-height:1.4}
  .vB .cap p{margin:0;font-size:12px;color:#555;line-height:1.9;letter-spacing:.04em}

  .vB .pt-vert{display:grid;gap:0}
  .vB .pt-item{display:grid;grid-template-columns:auto 1fr;gap:22px;padding:28px 0;border-top:1px solid #E6E3D9}
  .vB .pt-item:last-child{border-bottom:1px solid #E6E3D9}
  .vB .pt-item .big{font-family:"Noto Sans JP",sans-serif;font-size:50px;font-weight:500;color:#141414;line-height:1;letter-spacing:.02em;padding-top:2px}
  .vB .pt-item h4{margin:0 0 4px;font-family:"Noto Sans JP",sans-serif;font-size:18px;letter-spacing:.04em;line-height:1.5}
  .vB .pt-item .sub{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.28em;color:#B28844;margin-bottom:8px;text-transform:uppercase}
  .vB .pt-item p{margin:0;font-size:12px;color:#555;line-height:1.9;letter-spacing:.04em}

  /* BA stacked */
  .vB .ba2{margin-top:16px;display:grid;gap:40px}
  .vB .ba2 .case{border-top:1px solid #141414;padding-top:16px}
  .vB .ba2 .case .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .vB .ba2 .case .hd .num{font-family:"Noto Sans JP",sans-serif;font-size:20px;letter-spacing:.04em}
  .vB .ba2 .case .hd .use{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.25em;color:#B28844}
  .vB .ba2 .pair{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .vB .ba2 .col .tag{font-family:Inter,sans-serif;font-size:9px;letter-spacing:.3em;color:#888;margin-bottom:8px}
  .vB .ba2 .col .ph{height:170px}
  .vB .ba2 .col .ph.after{background:
    repeating-linear-gradient(135deg,rgba(178,136,68,.08) 0 6px,rgba(0,0,0,0) 6px 12px),
    linear-gradient(#EFEAD9,#DED7C1);color:#8A6A1F;border-color:rgba(178,136,68,.18)}
  .vB .ba2 .col .name{margin-top:8px;font-family:"Noto Sans JP",sans-serif;font-size:12px;letter-spacing:.04em}

  /* flow numbered vertical */
  .vB .flow2{position:relative;margin-top:0;padding-left:34px}
  .vB .flow2:before{content:"";position:absolute;left:12px;top:6px;bottom:6px;width:1px;background:#DAD6C8}
  .vB .flow2 .st{position:relative;padding:22px 0;border-top:1px solid #E6E3D9}
  .vB .flow2 .st:first-child{border-top:0}
  .vB .flow2 .st .dot{position:absolute;left:-29px;top:28px;width:11px;height:11px;border-radius:50%;background:#FAF9F5;border:2px solid #141414}
  .vB .flow2 .st .no{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.28em;color:#B28844}
  .vB .flow2 .st h5{margin:4px 0 2px;font-family:"Noto Sans JP",sans-serif;font-size:18px;letter-spacing:.04em;font-weight:600}
  .vB .flow2 .st p{margin:0;font-size:12px;color:#666;line-height:1.9}

  /* about editorial */
  .vB .about2{padding:80px 28px 48px;background:#141414;color:#EDEBE3;border-bottom:0}
  .vB .about2 .eye{color:#B28844}
  .vB .about2 .idx-line .rule{background:#3A3A3A}
  .vB .about2 .idx-line .eye,
  .vB .about2 .idx-line .num{color:#B28844}
  .vB .about2 h2{color:#fff;font-family:"Noto Sans JP",sans-serif;font-size:32px;letter-spacing:.06em}
  .vB .about2 .bio{font-size:13px;line-height:2.2;color:#C8C5B8;margin-top:20px}
  .vB .about2 .sv{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:32px;border-top:1px solid #3A3A3A}
  .vB .about2 .sv .s{padding:20px 0;border-bottom:1px solid #3A3A3A;display:flex;justify-content:space-between;align-items:center}
  .vB .about2 .sv .s:nth-child(odd){padding-right:14px;border-right:1px solid #3A3A3A}
  .vB .about2 .sv .s:nth-child(even){padding-left:14px}
  .vB .about2 .sv .s .nm{font-family:"Noto Sans JP",sans-serif;font-size:18px;letter-spacing:.04em}
  .vB .about2 .sv .s .cd{font-family:Inter,sans-serif;font-size:9px;letter-spacing:.25em;color:#B28844}

  /* final cta minimal */
  .vB .final2{padding:72px 28px;background:#FAF9F5;text-align:center}
  .vB .final2 .eye{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.35em;color:#B28844;text-transform:uppercase}
  .vB .final2 h3{margin:14px 0 12px;font-family:"Noto Sans JP",sans-serif;font-size:32px;letter-spacing:.06em;line-height:1.4}
  .vB .final2 p{margin:0 auto 28px;max-width:260px;font-size:13px;color:#555;line-height:1.9}
  .vB .final2 .btn{display:inline-flex;align-items:center;gap:12px;padding:16px 32px;background:#141414;color:#fff;font-weight:600;letter-spacing:.14em;font-size:13px;border-radius:2px}
  .vB .final2 .btn svg{width:14px;height:14px}
  .vB .final2 .btn:hover{background:#B28844;transition:background .3s}

  /* ═════════════════════════════════════════════════ */
  /*  VARIANT C — PREMIUM DARK                         */
  /* ═════════════════════════════════════════════════ */
  .vC{--bg:#0E1418;--ink:#F3EFE4;--line:#253038;--gold:#C89B5A}
  .vC{background:#0E1418;color:#F3EFE4}
  .vC .topnav .logo-mark{background:#C89B5A;color:#0E1418}
  .vC .topnav .logo-text{color:#F3EFE4}
  .vC .topnav .logo-text span{color:#8FA0A8}
  .vC .menu-btn{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.2)}
  .vC .menu-btn i,.vC .menu-btn i:before,.vC .menu-btn i:after{background:#F3EFE4}

  .vC .hero{min-height:680px;padding:76px 28px 36px;position:relative;overflow:hidden;background:
    radial-gradient(140% 60% at 80% 0%, rgba(200,155,90,.22) 0%, transparent 55%),
    radial-gradient(140% 70% at 0% 100%, rgba(60,120,145,.18) 0%, transparent 50%),
    #0E1418}
  .vC .hero .label{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.4em;color:#C89B5A;text-transform:uppercase}
  .vC .hero .label span{color:#5E7280;margin:0 10px}
  .vC .hero h1{margin:20px 0 0;font-family:"Noto Sans JP",sans-serif;font-weight:600;font-size:44px;line-height:1.25;letter-spacing:.04em;color:#F3EFE4}
  .vC .hero h1 em{font-style:normal;color:#C89B5A;border-bottom:1px solid #C89B5A;padding-bottom:4px}
  .vC .hero .sub{margin-top:20px;font-size:13px;line-height:2;color:#A9B6BC;letter-spacing:.1em;max-width:280px}
  .vC .hero-media{margin:32px -28px 24px;height:260px;position:relative;overflow:hidden;background:#182127;border-top:1px solid #253038;border-bottom:1px solid #253038}
  .vC .hero-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;opacity:.42;filter:saturate(.7) contrast(1.1)}
  .vC .hero-media .overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,#0E1418 95%)}
  .vC .hero-media .stamp{position:absolute;right:24px;bottom:24px;width:88px;height:88px;border:1px solid #C89B5A;border-radius:50%;display:grid;place-items:center;color:#C89B5A;font-family:"Noto Sans JP",sans-serif;text-align:center;font-size:10px;letter-spacing:.3em;line-height:1.6}
  .vC .hero-media .stamp b{display:block;font-size:20px;letter-spacing:.04em;margin-bottom:2px}
  .vC .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding:20px 28px;border-top:1px solid #253038;border-bottom:1px solid #253038;background:rgba(0,0,0,.18)}
  .vC .hero-stats .st{text-align:center;border-right:1px solid #253038;padding:0 4px}
  .vC .hero-stats .st:last-child{border-right:0}
  .vC .hero-stats .st .v{font-family:"Noto Sans JP",sans-serif;font-size:22px;color:#C89B5A;letter-spacing:.04em}
  .vC .hero-stats .st .l{font-family:Inter,sans-serif;font-size:9px;letter-spacing:.25em;color:#8FA0A8;text-transform:uppercase;margin-top:2px}

  .vC .sec{padding:64px 28px;border-bottom:1px solid #253038}
  .vC .eye-c{display:flex;align-items:center;gap:10px;font-family:Inter,sans-serif;font-size:10px;letter-spacing:.35em;color:#C89B5A;text-transform:uppercase;margin-bottom:20px}
  .vC .eye-c .sw{width:22px;height:1px;background:#C89B5A}
  .vC h2.cc{margin:0 0 32px;font-family:"Noto Sans JP",sans-serif;font-weight:600;font-size:30px;line-height:1.4;letter-spacing:.06em;color:#F3EFE4}

  .vC .prob-c{display:grid;gap:12px}
  .vC .prob-c .r{padding:22px 22px;background:rgba(255,255,255,.02);border:1px solid #253038;border-radius:4px;position:relative;overflow:hidden}
  .vC .prob-c .r .n{position:absolute;right:16px;top:14px;font-family:"Noto Sans JP",sans-serif;font-size:42px;color:rgba(200,155,90,.22);letter-spacing:-.02em}
  .vC .prob-c .r p{margin:0;font-size:15px;font-weight:500;line-height:1.6;letter-spacing:.04em;max-width:240px;color:#E8E3D5}
  .vC .prob-c .r .mt{margin-top:8px;font-family:Inter,sans-serif;font-size:9px;letter-spacing:.3em;color:#C89B5A}

  .vC .resolved{margin-top:22px;padding:24px;border:1px solid #C89B5A;border-radius:4px;position:relative}
  .vC .resolved .key{position:absolute;top:-10px;left:16px;background:#0E1418;padding:0 10px;font-family:Inter,sans-serif;font-size:10px;letter-spacing:.3em;color:#C89B5A}
  .vC .resolved p{margin:0;font-family:"Noto Sans JP",sans-serif;font-size:17px;letter-spacing:.04em;line-height:1.9;color:#F3EFE4}
  .vC .resolved p strong{color:#C89B5A;font-weight:600}

  .vC .cap-c{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:8px;background:#253038;border:1px solid #253038}
  .vC .cap-c .cl{padding:20px 16px;background:#0E1418;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .vC .cap-c .cl .gl{font-family:"Noto Sans JP",sans-serif;font-size:26px;color:#C89B5A;font-weight:600;letter-spacing:.04em;line-height:1.3}
  .vC .cap-c .cl .sub{font-family:Inter,sans-serif;font-size:9px;letter-spacing:.3em;color:#8FA0A8;margin-top:6px;text-transform:uppercase}
  .vC .cap-c .cl.wide{grid-column:1/-1;background:rgba(200,155,90,.06);color:#C89B5A;min-height:70px}
  .vC .cap-c .cl.wide .gl{color:#C89B5A;font-size:18px;letter-spacing:.1em}

  /* 3 points horizontal roman */
  .vC .pts-c{display:grid;gap:0}
  .vC .pt-c{display:grid;grid-template-columns:60px 1fr;gap:14px;padding:26px 0;border-top:1px solid #253038}
  .vC .pt-c:last-child{border-bottom:1px solid #253038}
  .vC .pt-c .ro{font-family:"Noto Sans JP",sans-serif;font-size:18px;color:#C89B5A;letter-spacing:.1em;line-height:1.1}
  .vC .pt-c .ro b{display:block;font-size:38px;line-height:1;color:#F3EFE4;font-weight:600;margin-top:4px}
  .vC .pt-c h4{margin:0 0 6px;font-family:"Noto Sans JP",sans-serif;font-size:19px;letter-spacing:.04em;line-height:1.5;color:#F3EFE4}
  .vC .pt-c p{margin:0;font-size:12px;color:#A9B6BC;line-height:1.9;letter-spacing:.04em}

  /* BA dark */
  .vC .ba-c{margin-top:8px;display:grid;gap:32px}
  .vC .ba-c .case{border:1px solid #253038;padding:20px}
  .vC .ba-c .case .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #253038}
  .vC .ba-c .case .hd .n{font-family:"Noto Sans JP",sans-serif;font-size:20px;letter-spacing:.2em;color:#C89B5A}
  .vC .ba-c .case .hd .u{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.25em;color:#8FA0A8}
  .vC .ba-c .pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .vC .ba-c .col .tg{font-family:Inter,sans-serif;font-size:9px;letter-spacing:.3em;margin-bottom:8px;color:#8FA0A8}
  .vC .ba-c .col.after .tg{color:#C89B5A}
  .vC .ba-c .col .ph{height:170px;background:
    repeating-linear-gradient(135deg,rgba(255,255,255,.04) 0 6px,transparent 6px 12px),
    #182127;color:#5E7280;border:1px solid #253038}
  .vC .ba-c .col.after .ph{background:
    repeating-linear-gradient(135deg,rgba(200,155,90,.08) 0 6px,transparent 6px 12px),
    linear-gradient(#1B2228,#14191E);color:#C89B5A;border-color:rgba(200,155,90,.2)}
  .vC .ba-c .col .nm{margin-top:8px;font-family:"Noto Sans JP",sans-serif;font-size:12px;color:#F3EFE4}

  /* flow roman dark */
  .vC .flow-c{margin-top:0}
  .vC .flow-c .sc{display:grid;grid-template-columns:60px 1fr auto;gap:14px;align-items:center;padding:22px 0;border-top:1px solid #253038}
  .vC .flow-c .sc:last-child{border-bottom:1px solid #253038}
  .vC .flow-c .sc .ri{font-family:"Noto Sans JP",sans-serif;font-size:22px;color:#C89B5A;letter-spacing:.1em}
  .vC .flow-c .sc h5{margin:0 0 2px;font-family:"Noto Sans JP",sans-serif;font-size:18px;letter-spacing:.04em;color:#F3EFE4}
  .vC .flow-c .sc .tm{font-family:Inter,sans-serif;font-size:9px;color:#8FA0A8;letter-spacing:.2em}
  .vC .flow-c .sc .arr{color:#C89B5A;font-size:18px}

  /* about gold */
  .vC .about-c{padding:72px 28px 48px;border-bottom:1px solid #253038;position:relative;overflow:hidden}
  .vC .about-c h2.cc{color:#F3EFE4}
  .vC .about-c .bio{font-size:13px;line-height:2.1;color:#C8D0D5;letter-spacing:.06em;margin-top:16px;max-width:300px}
  .vC .about-c .services{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:28px}
  .vC .about-c .services .s{padding:16px 14px;background:rgba(200,155,90,.04);border:1px solid #253038;position:relative}
  .vC .about-c .services .s:hover{border-color:#C89B5A;transition:border-color .3s}
  .vC .about-c .services .s .c{font-family:Inter,sans-serif;font-size:9px;letter-spacing:.3em;color:#C89B5A;margin-bottom:6px}
  .vC .about-c .services .s .n{font-family:"Noto Sans JP",sans-serif;font-size:16px;letter-spacing:.04em;color:#F3EFE4}
  .vC .about-c .ornament{position:absolute;right:-50px;top:40px;font-family:"Noto Sans JP",sans-serif;font-size:180px;color:rgba(200,155,90,.06);font-weight:600;letter-spacing:-.05em;line-height:1;pointer-events:none}

  .vC .final-c{padding:80px 28px;text-align:center;background:
    radial-gradient(100% 60% at 50% 0%, rgba(200,155,90,.15) 0%, transparent 65%),
    #0E1418}
  .vC .final-c .eye-c{justify-content:center;margin-bottom:20px}
  .vC .final-c h3{margin:0 0 14px;font-family:"Noto Sans JP",sans-serif;font-size:34px;line-height:1.4;letter-spacing:.08em;color:#F3EFE4}
  .vC .final-c p{margin:0 auto 32px;max-width:260px;font-size:13px;color:#A9B6BC;line-height:2;letter-spacing:.08em}
  .vC .final-c .btn{display:inline-flex;align-items:center;gap:14px;padding:18px 30px;background:#C89B5A;color:#0E1418;font-family:"Noto Sans JP",sans-serif;font-weight:600;letter-spacing:.14em;font-size:14px;border-radius:0}
  .vC .final-c .btn:hover{background:#D8AB6A;transition:background .3s}
  .vC .final-c .btn svg{width:14px;height:14px}
  .vC .final-c .footnote{margin-top:24px;font-family:Inter,sans-serif;font-size:9px;letter-spacing:.3em;color:#5E7280;text-transform:uppercase}

  /* ── Tweaks panel ── */
  .tweaks{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;border-radius:14px;padding:14px 14px;box-shadow:0 12px 40px rgba(0,0,0,.4);z-index:99;display:none;font-family:Inter,sans-serif;font-size:12px;width:240px}
  .tweaks.show{display:block}
  .tweaks h4{margin:0 0 10px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#C89B5A}
  .tweaks .row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .tweaks button{flex:1;min-width:60px;background:#222;border:1px solid #333;color:#ccc;padding:7px 8px;border-radius:6px;font-size:11px;cursor:pointer}
  .tweaks button.on{background:#C89B5A;color:#111;border-color:#C89B5A}
  .tweaks label{display:block;font-size:10px;color:#999;letter-spacing:.1em;margin-bottom:5px;text-transform:uppercase}
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- Variant A -->
  <div class="frame-wrap" data-variant="A">
    <div class="frame-label">Variant A<b>Refined Pop</b></div>
    <div class="frame vA" data-screen-label="Variant A — Refined Pop">
      <!-- content injected by JS -->
    </div>
  </div>
  <!-- Variant B -->
  <div class="frame-wrap" data-variant="B">
    <div class="frame-label">Variant B<b>Editorial Minimal</b></div>
    <div class="frame vB" data-screen-label="Variant B — Editorial Minimal">
    </div>
  </div>
  <!-- Variant C -->
  <div class="frame-wrap" data-variant="C">
    <div class="frame-label">Variant C<b>Premium Dark</b></div>
    <div class="frame vC" data-screen-label="Variant C — Premium Dark">
    </div>
  </div>
</div>

<!-- Tweaks panel -->
<div class="tweaks" id="tweaks">
  <h4>Tweaks</h4>
  <label>Show variants</label>
  <div class="row" id="variantToggles">
    <button data-v="A" class="on">A</button>
    <button data-v="B" class="on">B</button>
    <button data-v="C" class="on">C</button>
  </div>
  <label>Accent (Variant A)</label>
  <div class="row" id="accentA">
    <button data-c="#22C1E3" class="on" style="background:#22C1E3;color:#fff">cyan</button>
    <button data-c="#B28844" style="background:#B28844;color:#fff">gold</button>
    <button data-c="#D85858" style="background:#D85858;color:#fff">red</button>
  </div>
  <label>Density</label>
  <div class="row" id="density">
    <button data-d="cozy" class="on">cozy</button>
    <button data-d="roomy">roomy</button>
  </div>
</div>

<script src="content.js"></script>
<script src="tweaks.js"></script>
</body>
</html>
